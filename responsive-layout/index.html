<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout Lab | Modern Design</title>
    <meta name="description" content="Professional responsive layout demo">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <header class="hero">
            <h1 class="hero-title">Responsive <span class="gradient-text">Magic</span></h1>
            <p class="hero-subtitle">Adapts perfectly to every device</p>
        </header>
        
        <section class="cards-section">
            <div class="card card-1">
                <div class="card-icon">🌟</div>
                <h2 class="card-title">Hello World</h2>
                <p class="card-text">Experience seamless responsive design that works beautifully across all devices.</p>
                <button class="cta-button">Learn More</button>
            </div>
            
            <div class="card card-2">
                <div class="card-icon">🚀</div>
                <h2 class="card-title">Fast & Smooth</h2>
                <p class="card-text">Lightning-fast animations and smooth transitions for the ultimate user experience.</p>
                <button class="cta-button">Get Started</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
