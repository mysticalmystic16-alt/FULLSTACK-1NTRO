<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Basics Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  
    <header class="header">
        <h1>CSS Basics</h1>
        <nav>
            <ul class="nav-list">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

   
    <main class="main-content">
       
        <section class="box-model-demo">
            <h2>Box Model</h2>
            <div class="box-container">
                <div class="box-element">
                    <p>This demonstrates margin, padding, border, width, and height.</p>
                </div>
            </div>
        </section>

        <section class="flexbox-demo">
            <h2>Flexbox Layout</h2>
            <div class="flex-container">
                <div class="flex-item">Pen</div>
                <div class="flex-item">Pencil</div>
                <div class="flex-item">Eraser</div>
                <div class="flex-item">Notebook</div>
            </div>
        </section>

      
        <section class="form-demo">
            <h2>Contact Form</h2>
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </section>
    </main>


    <footer class="footer">
        <p>&copy; 2024 CSS Basics Project. All rights reserved.</p>
    </footer>
</body>
</html>
